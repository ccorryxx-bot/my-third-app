<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kyaw Gyi Signature V 7.1 - Smooth & 6-Char Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --emerald: #10b981;
            --blue: #3b82f6;
            --bg: #030712;
        }

        body { 
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(16, 185, 129, 0.12) 0%, transparent 35%),
                radial-gradient(circle at 90% 90%, rgba(59, 130, 246, 0.12) 0%, transparent 35%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
        }

        .btn-m89 {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 8px 25px -5px rgba(16, 185, 129, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-9w {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            box-shadow: 0 8px 25px -5px rgba(59, 130, 246, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-m89:active, .btn-9w:active { transform: scale(0.94); filter: brightness(1.2); }

        .shimmer-text {
            background: linear-gradient(90deg, #10b981, #60a5fa, #10b981);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s infinite linear;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .log-enter {
            animation: slideSmooth 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes slideSmooth {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-5 md:p-10 min-h-screen pb-40">

<div class="max-w-lg mx-auto">
    <!-- Smooth Header -->
    <div class="text-center mb-12 animate-fade-in">
        <p class="text-[10px] text-emerald-400 font-extrabold uppercase tracking-[0.6em] mb-3 opacity-80">Kyaw Gyi Signature V 7.1</p>
        <h1 class="text-5xl font-black tracking-tighter uppercase italic leading-none shimmer-text">VIP GEN</h1>
        <p class="text-slate-500 text-[9px] font-bold tracking-[0.3em] uppercase opacity-50 mt-4">Precision 6-Char & Smooth Logic</p>
    </div>

    <!-- Input Section -->
    <div class="glass-panel rounded-[2.5rem] p-8 md:p-10 mb-12">
        <div class="flex justify-between items-center mb-6 px-2">
            <div class="flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.8)] animate-pulse"></span>
                <span class="text-[11px] text-slate-400 font-bold uppercase tracking-widest">Phone Numbers</span>
            </div>
            <button onclick="clearAll()" class="text-[9px] text-red-400/70 font-black uppercase tracking-widest hover:text-red-400 transition-colors">
                Reset App
            </button>
        </div>
        
        <textarea 
            id="phoneInput" 
            rows="5" 
            class="w-full bg-black/40 border border-slate-800/50 rounded-[1.8rem] p-7 text-emerald-50 outline-none transition-all font-mono text-sm resize-none no-scrollbar focus:border-emerald-500/30 focus:bg-black/60 shadow-inner"
            placeholder="ထည့်သွင်းပါ..."></textarea>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 mt-10">
            <button onclick="generate('m89')" class="btn-m89 text-black font-black py-6 rounded-[1.5rem] flex items-center justify-center gap-2 text-xs tracking-widest uppercase">
                FOR M89.VIP 
            </button>
            <button onclick="generate('9w')" class="btn-9w text-white font-black py-6 rounded-[1.5rem] flex items-center justify-center gap-2 text-xs tracking-widest uppercase border-t border-white/10">
                FOR 9W.VIP
            </button>
        </div>
    </div>

    <!-- Toolbar -->
    <div id="toolbar" class="hidden flex items-center justify-between mb-8 px-6">
        <div class="flex flex-col">
            <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Database</span>
            <span id="count" class="text-2xl font-black text-white">0 Logs</span>
        </div>
        <button onclick="copyAll()" class="px-8 py-3.5 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-emerald-500 hover:text-black transition-all shadow-lg active:scale-95">
            Copy All
        </button>
    </div>

    <!-- List -->
    <div id="outputList" class="space-y-8"></div>
</div>

<!-- Soft Toast -->
<div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-white text-black px-12 py-4 rounded-full font-black text-[10px] opacity-0 transition-all duration-500 pointer-events-none uppercase tracking-widest z-50 shadow-2xl">
    Copied
</div>

<script>
    const letters = "abcdefghkmnpstuvwxyz";
    const numbers = "23456789";
    
    const config = {
        m89: { link: "https://tinyurl.com/OUTOFONEMYANMARM89WEB", prefix: "m89" },
        '9w': { link: "https://tinyurl.com/DawNwayWadiCOMM", prefix: "9w" }
    };
    
    let logs = [];

    const rnd = (len, pool) => {
        let r = "";
        for(let i=0; i<len; i++) r += pool.charAt(Math.floor(Math.random() * pool.length));
        return r;
    };

    const generateCreds = (type) => {
        const p = config[type].prefix;
        // Total MUST be 6 chars
        // M89 (3) + 1 letter + 2 nums = 6
        // 9W (2) + 2 letters + 2 nums = 6
        const user = type === 'm89' 
            ? p + rnd(1, letters) + rnd(2, numbers)
            : p + rnd(2, letters) + rnd(2, numbers);
            
        return {
            user: user,
            pass: rnd(3, letters) + rnd(3, numbers)
        };
    };

    const formatPhone = (v) => {
        let n = v.replace(/\D/g, '');
        if (n.startsWith('959')) n = n.substring(3);
        else if (n.startsWith('09')) n = n.substring(2);
        else if (n.startsWith('9')) n = n.substring(1);
        return '9 ' + n;
    };

    const clearAll = () => {
        document.getElementById('phoneInput').value = "";
        document.getElementById('outputList').innerHTML = "";
        document.getElementById('toolbar').classList.add('hidden');
        logs = [];
    };

    const generate = (type) => {
        const input = document.getElementById('phoneInput').value;
        const list = document.getElementById('outputList');
        const lines = input.split('\n').map(l => l.trim()).filter(l => l !== "");

        if (!lines.length) return;

        list.innerHTML = "";
        logs = [];
        document.getElementById('toolbar').classList.remove('hidden');
        document.getElementById('count').innerText = lines.length + " Logs";

        const currentLink = config[type].link;

        lines.forEach((line, i) => {
            const phone = formatPhone(line);
            const creds = generateCreds(type);
            logs.push({ ...creds, phone, link: currentLink });

            const div = document.createElement('div');
            div.className = "log-enter";
            div.style.animationDelay = (i * 0.05) + "s";
            
            div.innerHTML = `
                <div class="glass-panel rounded-[2rem] p-7 border border-white/5 relative overflow-hidden group">
                    <div class="relative z-10 font-mono text-sm space-y-4">
                        <div>
                            <p class="text-[10px] text-slate-500 font-bold mb-1 uppercase tracking-widest">Target Link</p>
                            <p class="${type === 'm89' ? 'text-emerald-400' : 'text-blue-400'} font-bold break-all leading-relaxed">${currentLink} 📌</p>
                            <p class="text-white/10 font-bold mt-2 tracking-tighter">━━━━━━━━━━━━━━━━━━━</p>
                        </div>

                        <div class="space-y-5">
                            <div class="flex justify-between items-center group/item">
                                <p class="text-slate-400 font-bold">အမည်      __  <span class="text-white text-base">${creds.user}</span></p>
                                <button onclick="copyText('${creds.user}', event)" class="p-2 bg-white/5 text-slate-500 rounded-lg hover:bg-emerald-500 hover:text-black transition-all active:scale-90">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                </button>
                            </div>
                            <div class="flex justify-between items-center group/item">
                                <p class="text-slate-400 font-bold">ပက်စဝှက်  __  <span class="text-white text-base">${creds.pass}</span></p>
                                <button onclick="copyText('${creds.pass}', event)" class="p-2 bg-white/5 text-slate-500 rounded-lg hover:bg-emerald-500 hover:text-black transition-all active:scale-90">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                </button>
                            </div>
                            <div class="flex justify-between items-center group/item">
                                <p class="text-slate-400 font-bold">ဖုန်းနံပါတ်  __  <span class="text-emerald-400 text-base font-bold">${phone}</span></p>
                                <button onclick="copyText('${phone}', event)" class="p-2 bg-white/5 text-slate-500 rounded-lg hover:bg-emerald-500 hover:text-black transition-all active:scale-90">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <button onclick="copyFull('${creds.user}', '${creds.pass}', '${phone}', '${currentLink}', event)" 
                         class="w-full mt-8 py-4 bg-white/5 hover:bg-white/10 text-white border border-white/10 rounded-xl text-[10px] font-bold uppercase tracking-[0.3em] transition-all">
                        Copy All Fields 📋
                    </button>
                </div>
            `;
            list.appendChild(div);
        });
        
        window.scrollTo({ top: document.getElementById('toolbar').offsetTop - 30, behavior: 'smooth' });
    };

    const copyFull = (u, p, ph, l, e) => {
        const text = `လင့်ခ် 👇\n${l} 📌\n━━━━━━━━━━━━━\n\n\nအမည်      __  ${u}\n\nပက်စဝှက်  __  ${p}\n\nဖုန်းနံပါတ်  __  ${ph}`;
        copyText(text, e);
    };

    const copyText = (t, e) => {
        if(e) e.stopPropagation();
        const el = document.createElement('textarea');
        el.value = t;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        
        const toast = document.getElementById('toast');
        toast.style.opacity = "1";
        toast.style.transform = "translate(-50%, -10px)";
        setTimeout(() => {
            toast.style.opacity = "0";
            toast.style.transform = "translate(-50%, 0)";
        }, 1200);
    };

    const copyAll = () => {
        if (!logs.length) return;
        let out = "";
        logs.forEach((log, i) => {
            out += `လင့်ခ် 👇\n${log.link} 📌\n━━━━━━━━━━━━━\n\n\nအမည်      __  ${log.user}\n\nပက်စဝှက်  __  ${log.pass}\n\nဖုန်းနံပါတ်  __  ${log.phone}`;
            if (i < logs.length - 1) out += `\n\n--------------------\n\n`;
        });
        copyText(out);
    };
</script>

</body>
</html>
